name: valcomp
description: "Valcomp: loja, estatisticas e alertas do VALORANT."
publish_to: none
version: 1.0.1+2

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  device_info_plus: ^13.1.0
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  flutter_local_notifications: ^22.0.1
  flutter_secure_storage: ^10.3.1
  flutter_svg: ^2.3.0
  http: ^1.6.0
  intl: ^0.20.2
  package_info_plus: ^10.1.0
  provider: ^6.1.5+1

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Asgard
      fonts:
        - asset: assets/fonts/Asgard-Regular.ttf
          weight: 400
        - asset: assets/fonts/Asgard-Medium.ttf
          weight: 500
        - asset: assets/fonts/Asgard-Bold.ttf
          weight: 700
        - asset: assets/fonts/Asgard-ExtraBold.ttf
          weight: 800

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/app-icon.png
  adaptive_icon_background: "#FF4655"
  adaptive_icon_foreground: assets/images/app-icon.png
